<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OverleafNord</title>
  <style>
    body {
      width: 280px;
      min-height: 340px;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      margin: 0;
      padding: 15px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
      background: linear-gradient(145deg, #2e3440, #3b4252 55%, #434c5e);
      color: #eceff4;
      border: 2px solid #4c566a;
    }
    h1 {
      font-size: 20px;
      margin: 10px 0 20px;
      text-align: center;
      letter-spacing: 2px;
      display: flex;
      align-items: center;
    }
    h1 img {
      width: 24px; /* Adjust the size of the icon */
      height: 24px;
      margin-right: 8px; /* Space between icon and text */
    }
    .toggle-container {
      height: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
    }
    .toggleButton {
      width: 100%;
      height: 40px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }
    .toggleButton::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: all 0.5s ease;
    }
    .toggleButton:hover::before {
      left: 100%;
    }
    #nordDarkThemeButton {
      background-color: #2e3440;
      color: #eceff4;
      border: 1px solid #4c566a;
    }
    #nordLightThemeButton {
      background-color: #f7f9fc;
      color: #2e3440;
      border: 1px solid #d8dee9;
    }
    #offButton {
      background-color: #eceff4;
      color: #3b4252;
      border: 1px solid #d8dee9;
    }
    #gruvboxDarkThemeButton {
      background-color: #282828;
      color: #ebdbb2;
      border: 1px solid #665c54;
    }
    #gruvboxLightThemeButton {
      background-color: #fbf1c7;
      color: #3c3836;
      border: 1px solid #d5c4a1;
    }
    .toggleButton.active {
      box-shadow: 0 0 0 2px #88c0d0, 0 0 14px rgba(136, 192, 208, 0.45);
      transform: scale(1.03);
    }
    .footer {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      color: #d8dee9;
    }
    .footer a {
      color: #88c0d0;
      text-decoration: none;
    }
    .footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <h1><img src="icons/icon48_w.png" alt="Icon">OverleafNord</h1>
  <div class="toggle-container">
    <button id="nordDarkThemeButton" class="toggleButton">Nord Dark (Default)</button>
    <button id="nordLightThemeButton" class="toggleButton">Nord Light (Snow)</button>
    <button id="gruvboxDarkThemeButton" class="toggleButton">Gruvbox Dusk</button>
    <button id="gruvboxLightThemeButton" class="toggleButton">Gruvbox Dawn</button>
    <button id="offButton" class="toggleButton">Default</button>
  </div>
  <div class="footer">
    <a href="https://github.com/dupeiran001/OverleafNord" target="_blank" rel="noopener noreferrer">github.com/dupeiran001/OverleafNord</a>
  </div>
  <script src="popup.js"></script>
</body>
</html>
